<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venkat - Contact</title>

    <link rel="stylesheet" href="assets/css/style.css">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <!-- Page Transition -->
    <div class="page-transition"></div>

    <!-- Background -->
    <div class="bg">
        <div class="glow glow1"></div>
        <div class="glow glow2"></div>
        <div class="glow glow3"></div>
    </div>

    <!-- Logo -->
    <div class="logo">✦ Venkat</div>

    <!-- Navbar -->
    <nav class="nav">
        <a href="index.html">Home</a>
        <a href="more.html">More</a>
        <a href="about.html">About Us</a>
        <a href="contact.html">Contact Us</a>
    </nav>

    <!-- Contact Section -->
    <section class="contact">

        <h1>Contact <span>Us</span></h1>
        <p class="contact-sub">
            Have a project or idea? Let’s build something amazing together.
        </p>

        <div class="contact-container">

            <!-- Form -->
            <form class="contact-form">

                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <input type="text" placeholder="Subject">
                <textarea placeholder="Your Message" rows="5" required></textarea>

                <button type="submit" class="cta">Send Message</button>

            </form>

            <!-- Info -->
            <div class="contact-info">
                <h3>Get in Touch</h3>

                <p>Email: yourmail@example.com</p>
                <p>Phone: +91 9876543210</p>
                <p>Location: Chennai, India</p>

            </div>

        </div>

    </section>

    <!-- Footer -->

    <footer class="footer reveal">

        <div class="footer-line"></div>

        <div class="footer-content">

            <p class="credit-main">Designed & Developed by Venkat</p>
            <p class="credit-sub">UI/UX Designer • Creative Developer</p>

            <!-- Socials -->
            <div class="socials">
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-linkedin"></i></a>
                <a href="#"><i class="fab fa-dribbble"></i></a>
                <a href="#"><i class="fab fa-youtube"></i></a>
            </div>

        </div>

    </footer>

    <script src="assets/js/script.js" defer></script>

</body>

</html>
